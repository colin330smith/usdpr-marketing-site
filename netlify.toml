# Netlify configuration for usdpr. marketing site
# Hosts the static HTML and a single capture Function for the lead-capture forms.

[build]
  publish = "."
  functions = ".netlify/functions-src"

[build.environment]
  NODE_VERSION = "20"

# ─── Routing ───────────────────────────────────────────────────────────────
# Forms POST to these paths — redirect them all to the capture function.
# status = 200 keeps the original path in the browser + returns function output.
# Covers: /leads/audit, /leads/analytics, /leads/share, /leads/playbook, etc.
[[redirects]]
  from = "/leads/*"
  to   = "/.netlify/functions/capture"
  status = 200
  force  = true

[[redirects]]
  from = "/cancel/action"
  to   = "/.netlify/functions/capture"
  status = 200
  force  = true

[[redirects]]
  from = "/schedule/book"
  to   = "/.netlify/functions/capture"
  status = 200
  force  = true

[[redirects]]
  from = "/referrals/submit"
  to   = "/.netlify/functions/capture"
  status = 200
  force  = true

[[redirects]]
  from = "/onboarding/step"
  to   = "/.netlify/functions/capture"
  status = 200
  force  = true

# ─── Stripe Payment Links — live ───────────────────────────────────────────
