# Netlify configuration for usdpr. marketing site
# Hosts the static HTML and a single capture Function for the lead-capture forms.

[build]
  publish = "."
  functions = ".netlify/functions-src"

[build.environment]
  NODE_VERSION = "20"

# ─── Routing ───────────────────────────────────────────────────────────────
# Forms POST to these paths — redirect them all to the capture function.
# status = 200 keeps the original path in the browser + returns function output.
# Covers: /leads/audit, /leads/analytics, /leads/share, /leads/playbook, etc.
[[redirects]]
  from = "/leads/*"
  to   = "/.netlify/functions/capture"
  status = 200
  force  = true

[[redirects]]
  from = "/cancel/action"
  to   = "/.netlify/functions/capture"
  status = 200
  force  = true

[[redirects]]
  from = "/schedule/book"
  to   = "/.netlify/functions/capture"
  status = 200
  force  = true

[[redirects]]
  from = "/referrals/submit"
  to   = "/.netlify/functions/capture"
  status = 200
  force  = true

[[redirects]]
  from = "/onboarding/step"
  to   = "/.netlify/functions/capture"
  status = 200
  force  = true

# ─── Stripe Payment Links — USDPR pricing ────────────────────────────
# Three offerings: Recovery Launch (one-time), Pro (monthly), Scale (monthly per loc).
# Current URLs are sandbox test-mode; swap to live links once Stripe KYC clears.
# New Stripe products need to be created on the live account — the legacy links
# below are placeholders until ACTIVATE_REVENUE.sh is re-run with new product SKUs.
# For now, all /signup routes direct to /pilot.html to capture lead before payment.

[[redirects]]
  from = "/signup"
  to   = "/pilot.html"
  status = 302
  force  = true
  query  = {tier = "pro"}

[[redirects]]
  from = "/signup"
  to   = "/pilot.html"
  status = 302
  force  = true
  query  = {tier = "scale"}

[[redirects]]
  from = "/signup"
  to   = "mailto:colin@usdentalpatientrecovery.com?subject=Enterprise%20inquiry"
  status = 302
  force  = true
  query  = {tier = "enterprise"}

# Default: land on pilot.html (founding-cohort capture page)
[[redirects]]
  from = "/signup"
  to   = "/pilot.html"
  status = 302
  force  = true

# Demo + dashboard placeholders until FastAPI backend is wired.
[[redirects]]
  from = "/demo"
  to   = "/for-orthodontics.html"
  status = 302

# Horizontal-specialty pages — deprecated in USDPR narrowing.
# 301 to /for-orthodontics.html for Google to reassign link equity.
[[redirects]]
  from = "/for-specialists.html"
  to   = "/for-orthodontics.html"
  status = 301

[[redirects]]
  from = "/for-managers.html"
  to   = "/for-orthodontics.html"
  status = 301

[[redirects]]
  from = "/for-dsos.html"
  to   = "/for-orthodontics.html"
  status = 301

[[redirects]]
  from = "/for-owners.html"
  to   = "/for-orthodontics.html"
  status = 301

[[redirects]]
  from = "/compare-matrix.html"
  to   = "/compare.html"
  status = 301

# Post-Stripe redirect lands on the frictionless onboarding flow.
# /welcome.html is also alive (legacy), but /onboarding/ is the canonical experience.
[[redirects]]
  from = "/welcome"
  to   = "/onboarding/"
  status = 302

[[redirects]]
  from = "/onboard"
  to   = "/onboarding/"
  status = 302

[[redirects]]
  from = "/app/dashboard"
  to   = "/onboarding/"
  status = 302

# Make /states/ and /cities/ work with or without trailing slash
[[redirects]]
  from = "/states"
  to   = "/states/index.html"
  status = 301

[[redirects]]
  from = "/cities"
  to   = "/cities/index.html"
  status = 301

# ─── Headers ───────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type  = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type  = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/feed.xml"
  [headers.values]
    Content-Type  = "application/rss+xml; charset=utf-8"

[[headers]]
  for = "/atom.xml"
  [headers.values]
    Content-Type  = "application/atom+xml; charset=utf-8"
