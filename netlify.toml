# Demo + dashboard placeholders until FastAPI backend is wired.
[[redirects]]
  from = "/demo"
  to   = "/compare.html"
  status = 302

[[redirects]]
  from = "/onboarding"
  to   = "/welcome.html"
  status = 302

[[redirects]]
  from = "/app/dashboard"
  to   = "/welcome.html"
  status = 302

# Make /states/ and /cities/ work with or without trailing slash
[[redirects]]
  from = "/states"
  to   = "/states/index.html"
  status = 301

[[redirects]]
  from = "/cities"
  to   = "/cities/index.html"
  status = 301

# ─── Headers ───────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type  = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type  = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/feed.xml"
  [headers.values]
    Content-Type  = "application/rss+xml; charset=utf-8"

[[headers]]
  for = "/atom.xml"
  [headers.values]
    Content-Type  = "application/atom+xml; charset=utf-8"
