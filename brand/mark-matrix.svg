<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="USDPR Recovery Opportunity Matrix">
  <!-- The USDPR brand mark: 3x3 matrix where 8 outer cells are the
       Recovery Opportunity states and the center is the practice. -->
  <rect x="1"  y="1"  width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.3"/>
  <rect x="17" y="1"  width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.3"/>
  <rect x="33" y="1"  width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.3"/>
  <rect x="1"  y="17" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.3"/>
  <rect x="17" y="17" width="14" height="14" rx="2" fill="#C26013" stroke="#C26013" stroke-width="1.3"/>
  <rect x="33" y="17" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.3"/>
  <rect x="1"  y="33" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.3"/>
  <rect x="17" y="33" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.3"/>
  <rect x="33" y="33" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.3"/>
  <!-- Practice anchor glyph in center cell -->
  <text x="24" y="28.5" text-anchor="middle" font-family="serif" font-size="12" font-style="italic" font-weight="500" fill="#F5F1E8">u</text>
</svg>
