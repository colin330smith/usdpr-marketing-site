<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>US Dental Patient Recovery</title>
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.04  0 0 0 0 0.035  0 0 0 0 0.03  0 0 0 0.04 0"/>
    </filter>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="630" fill="#f5f1ea"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.7"/>

  <!-- Thin brand frame -->
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="rgba(10,9,8,.14)" stroke-width="1"/>

  <!-- Top rule -->
  <line x1="80" y1="104" x2="1120" y2="104" stroke="rgba(10,9,8,.14)" stroke-width="1"/>

  <!-- Wordmark top-left -->
  <g transform="translate(80 82)">
    <text font-family="'Fraunces', Georgia, serif" font-size="34" font-weight="460" letter-spacing="-0.5">
      <tspan fill="#8b2a2a">U</tspan><tspan fill="#073036">SDPR</tspan>
    </text>
  </g>

  <!-- Small-caps subtitle top-right -->
  <g transform="translate(1120 80)" text-anchor="end">
    <text font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#5b544a">ORLANDO · FL</text>
    <text y="22" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#5b544a">EST. 2026</text>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(80 180)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#0a4247" stroke-width="1"/>
    <text x="42" y="5" font-family="'JetBrains Mono', monospace" font-size="15" letter-spacing="3.2" fill="#0a4247" font-weight="500">
      PATIENT REACTIVATION · FOR PRIVATE PRACTICES
    </text>
  </g>

  <!-- Massive editorial headline -->
  <g transform="translate(80 268)" font-family="'Fraunces', Georgia, serif" font-size="88" font-weight="360" fill="#0a0908" letter-spacing="-2">
    <text>The patients you</text>
    <text y="106"><tspan font-style="italic" fill="#0a4247">already have</tspan> are the</text>
    <text y="212">ones you're quietly</text>
    <text y="318">losing.</text>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="550" x2="1120" y2="550" stroke="rgba(10,9,8,.14)" stroke-width="1"/>

  <!-- Bottom metadata -->
  <g transform="translate(80 582)">
    <text font-family="'Fraunces', Georgia, serif" font-size="26" font-weight="420" letter-spacing="-0.3" fill="#0a0908">
      <tspan font-style="italic" fill="#0a4247">$1,000</tspan> flat pilot · 30 days · BAA signed first
    </text>
  </g>
  <g transform="translate(1120 590)" text-anchor="end">
    <text font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="2.8" fill="#5b544a">
      USDENTALPATIENTRECOVERY.COM
    </text>
  </g>
</svg>
